name: ci-placeholder

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate-docs-and-structure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify baseline files
        run: |
          test -f README.md
          test -f .editorconfig
          test -f .gitignore
          test -d backend
          test -d frontend
          test -d konsep
